<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県警察本部</title>
    <link rel="icon" href="ooyamapolice.webp" type="image/webp">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #ffffff; margin: 0; }

        /* 指定カラー #182b4b */
        .police-nav { background-color: #182b4b; height: 60px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1400px; margin: 0 auto; position: relative; }
        .nav-logo-link { position: absolute; left: 0; display: flex; align-items: center; }
        .nav-logo-icon { height: 45px; }
        .nav-menu { display: flex; }
        .nav-item { color: white; text-decoration: none; padding: 0 20px; font-size: 0.9rem; font-weight: bold; border-right: 1px solid rgba(255,255,255,0.4); white-space: nowrap; }
        .nav-item:last-child { border-right: none; }

        /* メインビジュアル */
        .main-hero { position: relative; width: 100%; height: 500px; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('jikosyori.png') no-repeat center center; background-size: cover; display: flex; align-items: center; justify-content: center; }
        .hero-text { color: white; font-family: 'Shippori Mincho', serif; font-size: 4.5rem; letter-spacing: 0.8rem; text-shadow: 3px 3px 12px rgba(0,0,0,0.6); font-weight: 700; }

        /* 目的別メニューセクション */
        .menu-section { padding: 60px 20px; background-color: #fff; }
        .menu-container { max-width: 1000px; margin: 0 auto; }

        .section-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: 0.1rem;
        }

        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .grid-item {
            border: 1px solid #e0e0e0;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px; /* 高さを統一 */
            padding: 10px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .grid-item:hover {
            background-color: #182b4b;
            color: #fff;
            border-color: #182b4b;
        }

        @media (max-width: 768px) {
            .grid-menu { grid-template-columns: repeat(2, 1fr); }
            .hero-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav class="police-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo-link">
                <img src="ooyamapolice.webp" alt="Home" class="nav-logo-icon">
            </a>
            <div class="nav-menu">
                <a href="intro.html" class="nav-item">大山県警の紹介</a>
                <a href="safety.html" class="nav-item">安全・安心な暮らし</a>

                <a href="recruit.html" class="nav-item">採用案内</a>
                <a href="news.html" class="nav-item">新着情報</a>
            </div>
        </div>
    </nav>

    <section class="main-hero">
        <h2 class="hero-text">「市民と共に」</h2>
    </section>

    <section class="menu-section">
        <div class="menu-container">
            <div class="section-title">
                目的別メニュー
            </div>
            
            <div class="grid-menu">
                <a href="license.html" class="grid-item">運転免許関係</a>
                <a href="application.html" class="grid-item">各種申請・手続き</a>
                <a href="recruit.html" class="grid-item">採用情報</a>
                <a href="record.html" class="grid-item">犯罪経歴証明書</a>
                <a href="stats.html" class="grid-item">各種統計資料</a>
                <a href="public.html" class="grid-item">大山県警の公表</a>
                <a href="consultation.html" class="grid-item">ご相談窓口</a>
                <a href="report.html" class="grid-item">情報受付窓口</a>
                <a href="sns.html" class="grid-item">公式SNS</a>
                <a href="pr.html" class="grid-item">警察広報資料</a>
                <a href="lost.html" class="grid-item">落とし物・忘れ物</a>
                <a href="contact.html" class="grid-item">窓口一覧</a>
            </div>
        </div>
    </section>

    <footer class="footer has-background-dark has-text-white">
        <div class="content has-text-centered">
            <p>&copy; 2026 大山県警察本部</p>
        </div>
    </footer>

</body>
</html>
