<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県警察本部</title>
    
    <link rel="icon" href="ooyamapolice.webp" type="image/webp">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            margin: 0;
        }

        /* トップバー設定: #182b4b */
        .police-nav {
            background-color: #182b4b;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: center; /* 中央揃え */
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        /* ロゴを左端に配置しつつリンク化 */
        .nav-logo-link {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
        }

        .nav-logo-icon {
            height: 45px;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            align-items: center;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            padding: 0 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            white-space: nowrap;
        }

        .nav-item:last-child {
            border-right: none;
        }

        /* メインビジュアル: 背景 jikosyori.png */
        .main-hero {
            position: relative;
            width: 100%;
            height: 550px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('jikosyori.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-text {
            color: white;
            font-family: 'Shippori Mincho', serif;
            font-size: 4.5rem;
            letter-spacing: 0.8rem;
            text-shadow: 3px 3px 12px rgba(0,0,0,0.6);
            font-weight: 700;
        }

        /* 目的別メニューセクション */
        .menu-section {
            padding: 50px 0;
            background-color: #fff;
        }

        .menu-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        /* 左側の大きなバナー（赤白ストライプ枠） */
        .online-banner {
            flex: 1;
            border: 8px solid;
            border-image: repeating-linear-gradient(-45deg, #d00, #d00 10px, #fff 10px, #fff 20px) 8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 400px;
        }

        /* 右側のグリッドメニュー */
        .grid-menu {
            flex: 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-item {
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .grid-item:hover {
            transform: translateY(-3px);
            background-color: #f9f9f9;
        }

        .grid-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="police-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo-link">
                <img src="ooyamapolice.webp" alt="Home" class="nav-logo-icon">
            </a>
            
            <div class="nav-menu">
                <a href="intro.html" class="nav-item">大山県警のご紹介</a>
                <a href="safety.html" class="nav-item">安全・安心な暮らし</a>
                <a href="traffic.html" class="nav-item">交通安全</a>
                <a href="application.html" class="nav-item">各種申請・手続き</a>
                <a href="consultation.html" class="nav-item">ご相談窓口</a>
                <a href="recruit.html" class="nav-item">採用案内</a>
                <a href="news.html" class="nav-item">新着情報</a>
            </div>
        </div>
    </nav>

    <section class="main-hero">
        <h2 class="hero-text">「市民と共に」</h2>
    </section>

    <section class="menu-section">
        <div class="has-text-centered mb-5">
            <h3 class="title is-4">目的別メニュー</h3>
        </div>
        <div class="menu-container">
            <div class="online-banner">
                <p class="subtitle is-6 mb-1">警察行政手続</p>
                <h4 class="title is-4">オンライン申請・届出</h4>
                <div class="mt-4">
                    <span class="tag is-info is-medium">パソコンで申請・届出ができます！</span>
                </div>
            </div>

            <div class="grid-menu">
                <div class="grid-item"><span>🪪</span><br>運転免許関係</div>
                <div class="grid-item"><span>📝</span><br>各種申請・手続き</div>
                <div class="grid-item"><span>👥</span><br>採用情報</div>
                <div class="grid-item"><span>📜</span><br>犯罪経歴証明書</div>
                <div class="grid-item"><span>📊</span><br>各種統計資料</div>
                <div class="grid-item"><span>👮</span><br>大山県警の公表</div>
                <div class="grid-item"><span>💬</span><br>ご相談窓口</div>
                <div class="grid-item"><span>📩</span><br>情報受付窓口</div>
                <div class="grid-item"><span>📱</span><br>公式SNS</div>
                <div class="grid-item"><span>📰</span><br>警察広報資料</div>
                <div class="grid-item"><span>⛱️</span><br>落とし物・忘れ物</div>
                <div class="grid-item"><span>📋</span><br>窓口一覧</div>
            </div>
        </div>
    </section>

    <footer class="footer has-background-dark has-text-white">
        <div class="content has-text-centered">
            <p>&copy; 2026 大山県警察本部</p>
        </div>
    </footer>

</body>
</html>
