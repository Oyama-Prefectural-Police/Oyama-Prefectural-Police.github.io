<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県警察本部</title>
    
    <link rel="icon" href="ooyamapolice.webp" type="image/webp">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            margin: 0;
        }

        /* 沖縄県警風トップバー（青背景に白文字） */
        .police-nav {
            background-color: #1a4fa3; /* 沖縄県警に近い青色 */
            padding: 10px 0;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            padding: 0 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        /* 最後の項目の境界線を消す */
        .nav-item:last-child {
            border-right: none;
        }

        .nav-item:hover {
            color: #dfe6e9;
            text-decoration: underline;
        }

        /* ロゴエリア */
        .logo-section {
            padding: 20px 0;
            text-align: center;
            background-color: #001f3f; /* ロゴ画像に合わせた濃紺 */
        }

        .logo-img {
            max-height: 120px; /* ロゴの大きさを調整 */
            display: block;
            margin: 0 auto;
        }

        /* コンテンツ */
        .main-content {
            padding: 50px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="logo-section">
        <div class="container">
            <img src="ooyamapolice.webp" alt="大山県警察" class="logo-img">
        </div>
    </header>

    <nav class="police-nav">
        <div class="nav-container">
            <a href="#" class="nav-item">大山県警のご紹介</a>
            <a href="#" class="nav-item">安全・安心な暮らし</a>
            <a href="#" class="nav-item">交通安全</a>
            <a href="#" class="nav-item">各種申請・手続き</a>
            <a href="#" class="nav-item">ご相談窓口</a>
            <a href="#" class="nav-item">採用案内</a>
            <a href="#" class="nav-item">新着情報</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <h1 class="title is-2">大山県の安全と平穏を守る</h1>
            <p class="subtitle">Oyama Prefectural Police Department</p>
            <div class="notification is-light">
                ここは現在構築中の大山県警察公式ウェブサイト（仮）です。
            </div>
        </div>
    </main>

    <footer class="footer has-background-dark has-text-white">
        <div class="content has-text-centered">
            <p>&copy; 2026 大山県警察本部</p>
        </div>
    </footer>

</body>
</html>
