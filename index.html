<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県警察本部 - Oyama Prefectural Police</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f5f5f5;
        }
        /* 日本の警察らしい濃紺のヘッダー */
        .navbar {
            background-color: #001f3f; 
        }
        .navbar-item, .navbar-link {
            color: #ffffff !important;
        }
        .hero.is-police {
            background: linear-gradient(rgba(0, 31, 63, 0.8), rgba(0, 31, 63, 0.8)), 
                        url('https://images.unsplash.com/photo-1541872703-74c5e443d1f9?q=80&w=2000&auto=format&fit=crop'); /* 背景画像例 */
            background-size: cover;
            color: white;
        }
        .section-title {
            border-left: 8px solid #001f3f;
            padding-left: 15px;
            margin-bottom: 2rem;
        }
        .footer {
            background-color: #001f3f;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="#">
                    <strong>大山県警察本部</strong>
                </a>
            </div>
            <div class="navbar-menu">
                <div class="navbar-end">
                    <a class="navbar-item">組織案内</a>
                    <a class="navbar-item">各部紹介</a>
                    <a class="navbar-item">装備品</a>
                    <a class="navbar-item">採用情報</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero is-medium is-police">
        <div class="hero-body">
            <div class="container has-text-centered">
                <h1 class="title is-1 has-text-white">
                    大山県の安全と平穏を守る
                </h1>
                <p class="subtitle has-text-white">
                    Oyama Prefectural Police Department
                </p>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="title is-3 section-title">組織の役割</h2>
            <div class="columns">
                <div class="column">
                    <div class="box">
                        <h3 class="title is-5">警備部</h3>
                        <p>テロ対策や要人警護、大規模災害時の救助活動を担います。特殊部隊(SAT)もこの管轄です。</p>
                    </div>
                </div>
                <div class="column">
                    <div class="box">
                        <h3 class="title is-5">刑事部</h3>
                        <p>凶悪犯罪の捜査、鑑識活動を行い、事件の早期解決を目指します。</p>
                    </div>
                </div>
                <div class="column">
                    <div class="box">
                        <h3 class="title is-5">地域部</h3>
                        <p>交番やパトカーによる巡回を行い、住民に最も近い場所で地域の安全を守ります。</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="content has-text-centered">
            <p>&copy; 2026 大山県警察本部. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
