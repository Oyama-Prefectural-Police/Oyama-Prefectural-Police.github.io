<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大山県警察本部</title>
    
    <link rel="icon" href="ooyamapolice.webp" type="image/webp">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            margin: 0;
        }

        /* 指定カラー #182b4b を使用したトップバー */
        .police-nav {
            background-color: #182b4b;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 左端のアイコン */
        .nav-logo-icon {
            height: 40px; /* バーの高さに合わせて調整 */
            margin-right: auto; /* これでアイコンを左端に寄せる */
        }

        .nav-menu {
            display: flex;
            align-items: center;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            padding: 0 25px;
            font-size: 0.95rem;
            font-weight: bold;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            white-space: nowrap;
        }

        .nav-item:last-child {
            border-right: none;
        }

        /* メインビジュアル（スクリーンショット風） */
        .main-hero {
            position: relative;
            width: 100%;
            height: 500px; /* 高さは適宜調整 */
            background: url('hero.jpg') no-repeat center center; /* メイン画像をhero.jpgとして指定 */
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 画像がない場合のバックアップカラー */
        .main-hero {
            background-color: #ddd;
        }

        .hero-text {
            color: white;
            font-family: 'Shippori Mincho', serif; /* 日本の警察サイト風の明朝体 */
            font-size: 4rem;
            letter-spacing: 0.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            font-weight: 700;
        }

        /* バナーエリア */
        .banner-section {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .banner-item {
            width: 300px;
            height: 100px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="police-nav">
        <div class="nav-container">
            <img src="ooyamapolice.webp" alt="Logo" class="nav-logo-icon">
            
            <div class="nav-menu">
                <a href="#" class="nav-item">大山県警のご紹介</a>
                <a href="#" class="nav-item">安全・安心な暮らし</a>
                <a href="#" class="nav-item">交通安全</a>
                <a href="#" class="nav-item">各種申請・手続き</a>
                <a href="#" class="nav-item">ご相談窓口</a>
                <a href="#" class="nav-item">採用案内</a>
                <a href="#" class="nav-item">新着情報</a>
            </div>
        </div>
    </nav>

    <section class="main-hero">
        <h2 class="hero-text">安全で安心な大山県の実現</h2>
    </section>

    <section class="banner-section">
        <div class="banner-item" style="background-color: black; color: gold; border: 3px solid gold;">技術流出の防止</div>
        <div class="banner-item" style="background-color: white; color: red; border: 2px solid red;">STOP! 痴漢</div>
        <div class="banner-item" style="background-color: #3498db; color: white;">I'm CLEAN（大麻対策）</div>
    </section>

</body>
</html>
